name: finfamily
description: Smart Family Financial Planning, Powered by AI
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  cloud_functions: ^4.6.5
  firebase_app_check: ^0.2.1+16

  # Charts
  fl_chart: ^0.67.0

  # Fonts / UI polish
  google_fonts: ^6.2.1

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  pin_code_fields: ^8.0.1
  http: ^1.2.2
  url_launcher: ^6.3.0

  # Gemini AI & Storage
  google_generative_ai: ^0.4.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true